spring:
  profiles:
    active: dev
  application:
    name: restaurant-reservation-system
  datasource:
    url: jdbc:postgresql://localhost:5432/restaurant_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

server:
  port: 8080
  error:
    include-message: always

app:
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-key-change-in-production-must-be-at-least-32-chars}
    expiration-ms: 86400000
  cors:
    allowed-origins: http://localhost:3000
  upload:
    # Всегда папка uploads рядом с запуском (backend/uploads)
    directory: ${user.dir}/uploads
    max-file-size-bytes: 5242880

logging:
  level:
    com.restaurant: INFO
    org.springframework.security: WARN
